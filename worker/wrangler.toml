name = "maxicompra-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespaces — crear con: wrangler kv namespace create ORDERS
# Luego reemplazar los IDs de abajo con los reales

[[kv_namespaces]]
binding = "ORDERS"
id = "f6d45226653549da9eb2dd00b29bbf7b"
preview_id = "837628585b3545539568e06ab141cc84"

[[kv_namespaces]]
binding = "CONFIG"
id = "f4249fae064143dfa5b592b7d27259bb"
preview_id = "feb978d733cb4475a6cc477c93a36b00"

# Variables de entorno (sin secretos — los secretos van con wrangler secret)
[vars]
STORE_NAME = "Maxicompra"
STORE_URL = "https://maxicompra.cl"
WHATSAPP_NUMBER = "56977462964"

# Secretos que debes configurar con:
#   wrangler secret put ADMIN_PASSWORD_HASH
#   wrangler secret put JWT_SECRET
#   wrangler secret put MP_ACCESS_TOKEN  (Phase 2 - Mercado Pago)
